<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: #ff1a1a; }
    header p {
      color: #888;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 620px;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #ff3333; }
    .input-row input::placeholder { color: #555; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 20px;
      transition: background 0.2s, opacity 0.2s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-red {
      background: #cc0000;
      color: #fff;
    }
    .btn-red:hover:not(:disabled) { background: #e60000; }

    .btn-outline {
      background: transparent;
      border: 1px solid #444;
      color: #ccc;
    }
    .btn-outline:hover:not(:disabled) { border-color: #888; color: #fff; }

    /* Vista previa del video */
    #preview { display: none; }
    .preview-inner {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .preview-inner img {
      width: 120px;
      height: 68px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #222;
    }
    .preview-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .preview-meta { color: #888; font-size: 0.8rem; }

    /* Selector de calidad */
    #quality-section { display: none; }
    #quality-section h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .quality-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 420px) { .quality-grid { grid-template-columns: 1fr; } }

    .quality-option {
      background: #111;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .quality-option:hover { border-color: #555; }
    .quality-option.selected {
      border-color: #cc0000;
      background: #1f0a0a;
    }
    .quality-option .ql { font-size: 0.92rem; font-weight: 600; }
    .quality-option .qd { font-size: 0.78rem; color: #777; margin-top: 2px; }

    /* Botón descargar */
    #download-btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      background: #cc0000;
      color: #fff;
      border-radius: 10px;
    }
    #download-btn:hover:not(:disabled) { background: #e60000; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    #error-box {
      display: none;
      background: #1f0a0a;
      border: 1px solid #5c1010;
      border-radius: 10px;
      padding: 14px 16px;
      color: #ff6b6b;
      font-size: 0.88rem;
      max-width: 620px;
      width: 100%;
    }

    /* Toast descarga */
    #toast {
      display: none;
      background: #0a2a0a;
      border: 1px solid #1a5c1a;
      border-radius: 10px;
      padding: 14px 16px;
      color: #6bff6b;
      font-size: 0.88rem;
      max-width: 620px;
      width: 100%;
      text-align: center;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<header>
  <h1>YT <span>Downloader</span></h1>
  <p>Descarga videos de YouTube fácilmente</p>
</header>

<!-- Tarjeta principal: URL -->
<div class="card">
  <div class="input-row">
    <input type="text" id="url-input" placeholder="Pega el enlace de YouTube aquí…" />
    <button class="btn-red" id="analyze-btn" onclick="analizar()">Analizar</button>
  </div>
</div>

<!-- Vista previa -->
<div class="card" id="preview">
  <div class="preview-inner">
    <img id="thumb" src="" alt="thumbnail" />
    <div class="preview-info">
      <h3 id="video-title">—</h3>
      <div class="preview-meta">
        <span id="video-channel">—</span> &middot; <span id="video-duration">—</span>
      </div>
    </div>
  </div>
</div>

<!-- Selector de calidad + botón -->
<div class="card" id="quality-section">
  <h2>Selecciona la calidad</h2>
  <div class="quality-grid" id="quality-grid">
    {% for q in qualities %}
    <div class="quality-option" onclick="seleccionar(this, '{{ q.id }}')" data-id="{{ q.id }}">
      <div class="ql">{{ q.label }}</div>
      <div class="qd">{{ q.desc }}</div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Botón descargar -->
<div style="width:100%;max-width:620px;display:none" id="dl-wrapper">
  <div id="toast">✅ ¡Descarga iniciada! Revisa tu carpeta de descargas.</div>
  <button id="download-btn" disabled onclick="descargar()">Selecciona una calidad para continuar</button>
</div>

<!-- Error -->
<div id="error-box">⚠️ <span id="error-msg"></span></div>

<script>
  let selectedFormat = null;
  let currentUrl = "";

  function mostrarError(msg) {
    const box = document.getElementById("error-box");
    document.getElementById("error-msg").textContent = msg;
    box.style.display = "block";
    setTimeout(() => { box.style.display = "none"; }, 6000);
  }

  function setLoading(btn, loading, text) {
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
  }

  async function analizar() {
    const input = document.getElementById("url-input");
    const url = input.value.trim();
    if (!url) { mostrarError("Pega un enlace de YouTube primero."); return; }

    currentUrl = url;
    selectedFormat = null;

    // Ocultar secciones previas
    document.getElementById("preview").style.display = "none";
    document.getElementById("quality-section").style.display = "none";
    document.getElementById("dl-wrapper").style.display = "none";
    document.getElementById("toast").style.display = "none";
    document.getElementById("error-box").style.display = "none";

    // Deseleccionar calidades
    document.querySelectorAll(".quality-option").forEach(el => el.classList.remove("selected"));

    const btn = document.getElementById("analyze-btn");
    setLoading(btn, true, "Analizando…");

    try {
      const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) { mostrarError(data.error || "Error al analizar."); return; }

      document.getElementById("thumb").src = data.thumbnail || "";
      document.getElementById("video-title").textContent = data.title;
      document.getElementById("video-channel").textContent = data.channel;
      document.getElementById("video-duration").textContent = data.duration;

      document.getElementById("preview").style.display = "block";
      document.getElementById("quality-section").style.display = "block";
      document.getElementById("dl-wrapper").style.display = "block";

    } catch (e) {
      mostrarError("No se pudo conectar con el servidor.");
    } finally {
      setLoading(btn, false, "Analizar");
    }
  }

  function seleccionar(el, formatId) {
    document.querySelectorAll(".quality-option").forEach(o => o.classList.remove("selected"));
    el.classList.add("selected");
    selectedFormat = formatId;
    const btn = document.getElementById("download-btn");
    btn.disabled = false;
    btn.textContent = "⬇️ Descargar";
  }

  async function descargar() {
    if (!selectedFormat) return;
    document.getElementById("toast").style.display = "none";
    document.getElementById("error-box").style.display = "none";

    const btn = document.getElementById("download-btn");
    setLoading(btn, true, "Descargando…");

    try {
      const res = await fetch("/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: currentUrl, format_id: selectedFormat })
      });

      if (!res.ok) {
        const err = await res.json();
        mostrarError(err.error || "Error en la descarga.");
        return;
      }

      // Obtener nombre del archivo desde el header
      const disposition = res.headers.get("Content-Disposition") || "";
      let filename = "video.mp4";
      const match = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^"';\n]+)/i);
      if (match) filename = decodeURIComponent(match[1]);

      const blob = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = objUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objUrl);

      document.getElementById("toast").style.display = "block";

    } catch (e) {
      mostrarError("Error al descargar el archivo.");
    } finally {
      setLoading(btn, false, "⬇️ Descargar");
      btn.disabled = false;
    }
  }

  // Permitir Enter en el input
  document.getElementById("url-input").addEventListener("keydown", e => {
    if (e.key === "Enter") analizar();
  });
</script>
</body>
</html>
